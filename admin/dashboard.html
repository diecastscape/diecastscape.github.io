<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard — Diecast.scape</title>
<link rel="stylesheet" href="/assets/css/admin-style.css">
</head>
<body class="auth-loading">

<div class="header">
  <b>Diecast.scape Admin</b>
  <button onclick="adminLogout()" id="logoutBtn">Logout</button>
</div>
<div id="logoutLoader" class="loader-bar"></div>
  
<div class="container">
  <h2 class="dash-title">Dashboard</h2>

    <!-- MAIN SALE -->
    <div class="dash-card">
    <div class="dash-top">
  <h3>Main Store</h3>
  <button onclick="openSection('main')">View</button>
  </div>
    </div>
    <!-- SPECIAL SALE -->
  <div class="dash-card">
  <div class="dash-top">
  <h3>Special Store</h3>
  <button onclick="openSection('special')">View</button>
</div>
  </div>

  <!-- ===== MAIN SALE SECTION ===== -->
  <div id="section-main" class="section-panel">
    <div class="section-top">
      <h3>Main Store</h3>
      <div class="btn-row">
      <button onclick="toggleList('main')">Refresh</button>
      <button onclick="toggleAdd('main')" id="mainAddBtn">+ Add</button>
    </div>
    </div>
    <div class="border-top"></div>
  <div id="mainProducts"></div>
    <div id="add-main" class="add-wrap">
      <div id="mainAddForm">
        <h4 id="mainEditModeBar" class="edit-mode-bar" style="display:none;">
  Adding Product
        </h4>  
 <h5>Name</h5>     
<input id="p-name" placeholder="Product title">
<h5>Price</h5>
        <div class="price-row">
  <input id="p-old" placeholder="Retail price">
  <input id="p-new" placeholder="Discounted price">
</div>
 <h5>Details (description)</h5>       
<textarea id="p-details"></textarea>
   <h5>Shipping</h5>     
<input id="p-shipping" placeholder="shipping charges">        
<h5>Image path</h5>
<div id="imagesList"></div>
<button onclick="addImageField()" class="primary-btn">+ Add Image</button>
  <button onclick="saveProduct()" class="primary-btn" id="saveBtn">Save Product</button>
  <button onclick="cancelEdit('main')" class="primary-btn secondary-btn">Cancel</button>
<div id="saveLoader" class="loader"></div>
<p class="center-msg" id="saveMsg"></p>
      </div>
    </div>
  </div>
  

  <!-- ===== SPECIAL SALE SECTION ===== -->
  <div id="section-special" class="section-panel">
    <div class="section-top">
      <h3>Special Store</h3>
      <div class="btn-row">
      <button onclick="toggleList('special')">Refresh</button>
      <button onclick="toggleAdd('special')" id="specialAddBtn">+ Add</button>
    </div>
    </div>
    <div class="border-top"></div>
    <div id="saleControlBox" class="sale-control">
  <h4>Sale Time Control</h4>

  <div class="toggle-row">
    <span>Enable Sale Manually</span>

    <label class="toggle-switch">
      <input type="checkbox" id="sale-enabled">
      <span class="toggle-slider"></span>
    </label>
  </div>

  <br>

  <label>
    Sale Start Time:
    <input type="datetime-local" id="sale-start">
  </label>

  <br><br>
  <button onclick="saveSaleConfig()" class="primary-btn" id="saleSaveBtn">Save Sale Settings</button>
<div id="saleSaveLoader" class="loader"></div>
  <div class="center-msg" id="sale-save-msg"></div>
   <div class="border-top"></div>
    </div>
    <div id="specialProducts"></div>
    <div id="add-special" class="add-wrap">
      <div id="specialAddForm">
        <h4 id="specialEditModeBar" class="edit-mode-bar" style="display:none;">
  Adding Product
        </h4>
  <h5>Name</h5>      
<input id="s-name" placeholder="Product title">
<h5>Price</h5>
<input id="s-price" placeholder="Sale price">
<h5>Shipping</h5>
<input id="s-shipping" placeholder="shipping charges">       
<h5>Image path</h5>
<div id="s-imagesList"></div>

<button onclick="addSaleImageField()" class="primary-btn">
+ Add Image
</button>

<button onclick="saveSaleProduct()" class="primary-btn" id="s-saveBtn">
Save Product
</button>
<button onclick="cancelEdit('special')" class="primary-btn secondary-btn">Cancel</button>


<div id="s-saveLoader" class="loader"></div>
<p class="center-msg" id="s-saveMsg"></p>
    </div>
    </div>
  
  </div>
</div>

<script type="module" src="/assets/js/admin-auth.js"></script>
<script type="module" src="/assets/js/firebase-init.js"></script>
<script type="module" src="/assets/js/dashboard.js"></script>

</body>
</html>
